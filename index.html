<style>
  :root {
    --brand: #1EBCAD;
    --brand-rgb: 30, 188, 173;
    --brand-hover: #179C8F;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e14;
    color: #e8edf3;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(rgba(10,14,20,0.55), rgba(10,14,20,0.82));
    z-index: -1;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 48px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 17px;
    font-weight: 700;
    color: #e8edf3;
    text-decoration: none;
    letter-spacing: -0.3px;
  }

  .logo-mark {
    width: 30px; height: 30px;
    display: block;
  }

  .nav-right {
    display: flex; align-items: center; gap: 28px;
  }

  .nav-right a {
    color: #6b7a8d;
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }

  .nav-right a:hover { color: #e8edf3; }

  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px 80px;
    position: relative;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(var(--brand-rgb),0.07) 0%, transparent 65%);
    pointer-events: none;
  }

  h1 {
    font-size: clamp(52px, 9vw, 110px);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -3px;
    color: #e8edf3;
    margin-bottom: 40px;
  }

  h1 em {
    font-style: normal;
    color: var(--brand);
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--brand);
    color: #0a0e14;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 16px 36px;
    border-radius: 8px;
    text-decoration: none;
    margin-bottom: 40px;
    transition: background 0.2s;
  }

  .cta:hover { background: var(--brand-hover); }

  .cta svg { width: 16px; height: 16px; }

  .tagline {
    font-size: clamp(20px, 2.6vw, 30px);
    font-weight: 500;
    color: #ffffff;
    letter-spacing: -0.01em;
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: #6b7a8d;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    nav { padding: 20px 22px; }
    .hero { padding: 0 24px 32px; }
    h1 { margin-bottom: 32px; letter-spacing: -2px; }
    .cta { margin-bottom: 32px; }
  }
</style>
</head>
<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="background.mp4" type="video/mp4">
</video>
<div class="bg-overlay"></div>

<nav>
  <div class="logo">
    <img class="logo-mark" src="logo.png" alt="Coinbroo logo">
    Coinbroo
  </div>

</nav>

<section class="hero">
  <h1>The <em>Ocean</em> is<br>the Limit.</h1>
  <a href="https://app.coinbroo.com/" class="cta">
    Trade now
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M3 8h10M9 4l4 4-4 4"/>
    </svg>
  </a>
  <p class="tagline">Trade at your scale—shrimp, fish, shark, or whale.</p>
</section>

<footer>Coinbroo ©2026</footer>

</body>
</html>
